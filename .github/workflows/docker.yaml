name: Docker Publish

on:
  push:
    branches:
      - main

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CONTEXT: .
  GHCR_TAG: ghcr.io/lvillis/tcping:latest
  DOCKER_TAG: docker.io/lvillis/tcping:latest
  BUILDER_NAME: tcping-builder

jobs:
  job1:
    name: latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install QEMU binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install arm64

      - name: Create buildx builder
        run: |
          docker buildx create --name "${BUILDER_NAME}" --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Login to docker.io
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: echo "${DOCKER_TOKEN}" | docker login docker.io --username "${DOCKER_USER}" --password-stdin

      - name: Login to ghcr.io
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io --username "${GHCR_USER}" --password-stdin

      - name: Build and push
        run: |
          docker buildx build \
            --builder "${BUILDER_NAME}" \
            --platform linux/amd64,linux/arm64 \
            --file Dockerfile \
            --push \
            --cache-from "type=registry,ref=${DOCKER_TAG}" \
            --cache-to type=inline \
            --tag "${GHCR_TAG}" \
            --tag "${DOCKER_TAG}" \
            "${CONTEXT}"
